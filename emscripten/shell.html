<!DOCTYPE HTML>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>yikes!</title>
    <style>{{{ SHELL_CSS }}}</style>
	<style>
		body {
			background: #111;
			color: #fff;
			font-family: monospace;
		}

		body #emscripten_logo {
			width: 200px;
		}

		#folder-picker {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 40px;
			text-align: center;
		}

		#folder-picker h2 {
			margin-bottom: 8px;
		}

		#folder-picker p {
			color: #aaa;
			margin-bottom: 20px;
			max-width: 500px;
		}

		#select-folder-btn {
			padding: 14px 36px;
			font-size: 18px;
			background: #ff6600;
			color: #000;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-weight: bold;
		}

		#select-folder-btn:hover {
			background: #ff8833;
		}

		#selected-path {
			margin-top: 12px;
			color: #888;
			font-size: 13px;
		}

		#game-area {
			display: none;
		}
	</style>
  </head>
  <body>
    <div id="folder-picker">
      <img src="assets/portal.svg" style="width:200px;margin-bottom:20px">
      <h2>Portal: Web Port</h2>
      <p>Select your Portal game installation folder to play offline.
         The game will read and write files directly from your local folder.</p>
      <div id="launch-params-wrapper" style="display:none;margin-bottom:12px;width:100%;max-width:400px">
        <label style="display:block;margin-bottom:4px;color:#aaa;font-size:13px;text-align:left">Launch parameters (advanced):</label>
        <input type="text" id="launch-params" style="width:100%;padding:8px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;font-family:monospace;font-size:13px;box-sizing:border-box">
      </div>
      <button id="play-btn" style="display:none;padding:14px 36px;font-size:18px;background:#ff6600;color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-bottom:12px">Play Portal</button>
      <button id="select-folder-btn">Select Portal Folder</button>
      <div id="selected-path"></div>
    </div>

    <div id="game-area">
      <a href="http://emscripten.org"><img id="emscripten_logo" src="assets/portal.svg"></a>

      <div class="spinner" id='spinner'></div>
      <div class="emscripten" id="status"></div>

      <span id='controls'>
        <span><input type="button" value="Fullscreen" onclick="Module.requestFullscreen(document.getElementById('pointerLock').checked, 
                                                                                    document.getElementById('resize').checked)">
        </span>
      </span>

      <div class="emscripten">
        <progress value="0" max="100" id="progress" hidden=1></progress>
      </div>

      <div class="emscripten_border">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
      </div>
      <textarea id="output" rows="8"></textarea>
    </div>

    <div id="error-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;color:#f44;font-family:monospace;padding:20px;z-index:9999;overflow:auto;white-space:pre-wrap;font-size:14px">
      <div style="max-width:800px;margin:0 auto">
        <h2>Portal Web — Error</h2>
        <div id="error-text"></div>
        <button id="copy-error-btn" style="margin-top:16px;padding:10px 20px;background:#ff6600;color:#000;border:none;border-radius:4px;font-weight:bold;cursor:pointer">Copy Console</button>
        <button onclick="location.reload()" style="margin-left:8px;padding:10px 20px;background:#444;color:#fff;border:none;border-radius:4px;cursor:pointer">Reload</button>
        <button onclick="document.getElementById('error-overlay').style.display='none'" style="margin-left:8px;padding:10px 20px;background:#444;color:#fff;border:none;border-radius:4px;cursor:pointer">Dismiss</button>
      </div>
    </div>

    <script type='text/javascript'>
      // Eruda debug console — activate with ?debug=true
      if (location.search.includes('debug=true')) {
        var scr = document.createElement('script');
        scr.src = 'https://cdn.jsdelivr.net/npm/eruda';
        scr.onload = function () { eruda.init(); };
        document.head.appendChild(scr);
      }

      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      var folderPicker = document.getElementById('folder-picker');
      var gameArea = document.getElementById('game-area');
      var selectBtn = document.getElementById('select-folder-btn');
      var selectedPathEl = document.getElementById('selected-path');
      if (outputElement) outputElement.value = '';

      // In-memory cache of the folder handle + index (set by selectAndIndexFolder)
      var _indexedHandle = null;
      var _dirIndex = null;

      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      canvasElement.widthNative = screen.availWidth;
      canvasElement.heightNative = screen.availHeight;

      // ====== Folder selection persistence (IndexedDB) ======
      const DB_NAME = 'portalweb-folder';
      const DB_VERSION = 1;
      const STORE_NAME = 'handles';

      function openDB() {
        return new Promise((resolve, reject) => {
          var req = indexedDB.open(DB_NAME, DB_VERSION);
          req.onupgradeneeded = function(e) {
            e.target.result.createObjectStore(STORE_NAME);
          };
          req.onsuccess = function(e) { resolve(e.target.result); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      }

      async function saveHandle(handle) {
        var db = await openDB();
        var tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(handle, 'folderHandle');
        await new Promise(function(resolve) { tx.oncomplete = resolve; });
        db.close();
      }

      async function loadHandle() {
        try {
          var db = await openDB();
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.get('folderHandle');
          var handle = await new Promise(function(resolve, reject) {
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
          });
          db.close();
          return handle || null;
        } catch (e) {
          return null;
        }
      }

      async function saveLaunchParams(params) {
        var db = await openDB();
        var tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(params, 'launchParams');
        await new Promise(function(resolve) { tx.oncomplete = resolve; });
        db.close();
      }

      async function loadLaunchParams() {
        try {
          var db = await openDB();
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.get('launchParams');
          var val = await new Promise(function(resolve, reject) {
            req.onsuccess = function() { resolve(req.result); };
            req.onerror = function() { reject(req.error); };
          });
          db.close();
          return val || '';
        } catch (e) {
          return '';
        }
      }

      var playBtn = document.getElementById('play-btn');
      var launchParamsInput = document.getElementById('launch-params');
      var launchParamsWrapper = document.getElementById('launch-params-wrapper');

      // Try to restore saved folder and launch params on page load
      (async function() {
        var savedHandle = await loadHandle();
        var savedParams = await loadLaunchParams();
        if (savedParams) {
          launchParamsWrapper.style.display = 'block';
          launchParamsInput.value = savedParams;
        }
        if (savedHandle) {
          _indexedHandle = savedHandle;
          playBtn.style.display = 'block';
          launchParamsWrapper.style.display = 'block';
        }
      })();

      // ====== Index and save folder (no launch) ======
      async function selectAndIndexFolder(rootDirHandle, launchParams) {
        try {
          selectBtn.disabled = true;
          selectBtn.textContent = 'Indexing...';
          selectedPathEl.textContent = 'Indexing ' + rootDirHandle.name + '...';

          const dirIndex = new Map();
          async function indexDirectory(handle, prefix) {
            for await (const entry of handle.values()) {
              const path = prefix ? prefix + '/' + entry.name : entry.name;
              if (entry.kind === 'file') {
                dirIndex.set(path.toLowerCase(), entry);
              } else if (entry.kind === 'directory') {
                await indexDirectory(entry, path);
              }
            }
          }

          const start = performance.now();
          await indexDirectory(rootDirHandle, '');
          const elapsed = ((performance.now() - start) / 1000).toFixed(1);

          selectedPathEl.textContent = rootDirHandle.name + ' (' + dirIndex.size + ' files indexed in ' + elapsed + 's)';

          // Persist
          await saveHandle(rootDirHandle);
          await saveLaunchParams(launchParams);
          launchParamsWrapper.style.display = 'block';

          // Store in memory for Play button
          _indexedHandle = rootDirHandle;
          _dirIndex = dirIndex;

          // Show Play button (above Select)
          playBtn.style.display = 'block';
          selectBtn.disabled = false;
          selectBtn.textContent = 'Select Portal Folder';
        } catch (err) {
          if (err.name === 'SecurityError' || err.name === 'AbortError') {
            selectedPathEl.textContent = 'Access denied or cancelled. Please try again.';
          } else {
            selectedPathEl.textContent = 'Error: ' + err.message;
          }
          selectBtn.disabled = false;
          selectBtn.textContent = 'Select Portal Folder';
        }
      }

      // ====== Launch the engine (called by Play button) ======
      async function launchGame() {
        try {
          var handle = _indexedHandle || await loadHandle();
          if (!handle) {
            selectedPathEl.textContent = 'No folder selected. Please select your Portal folder.';
            return;
          }
          var launchParams = launchParamsInput.value;

          playBtn.disabled = true;
          selectBtn.disabled = true;
          playBtn.textContent = 'Loading...';

          // Index if not already indexed (e.g. after page reload)
          if (!_dirIndex) {
            selectedPathEl.textContent = 'Indexing ' + handle.name + '...';
            _dirIndex = new Map();
            async function indexDirectory(h, prefix) {
              for await (const entry of h.values()) {
                const path = prefix ? prefix + '/' + entry.name : entry.name;
                if (entry.kind === 'file') {
                  _dirIndex.set(path.toLowerCase(), entry);
                } else if (entry.kind === 'directory') {
                  await indexDirectory(entry, path);
                }
              }
            }
            const start = performance.now();
            await indexDirectory(handle, '');
            const elapsed = ((performance.now() - start) / 1000).toFixed(1);
            selectedPathEl.textContent = handle.name + ' (' + _dirIndex.size + ' files indexed in ' + elapsed + 's)';
          }

          // Set launch arguments on Module
          if (launchParams) {
            Module.arguments = launchParams.trim().split(/\s+/);
          }

          // Share folder access with pre.js main-thread code
          Module._rootHandle = handle;
          Module._dirIndex = _dirIndex;

          // Send directory index to the worker thread
          if (Module._sendFolderIndexToWorker) {
            Module._sendFolderIndexToWorker();
          }

          // Pre-load critical files into MEMFS before starting the engine
          await Module._preloadCriticalFiles();

          folderPicker.style.display = 'none';
          gameArea.style.display = '';

          // Start the game (runtime should already be initialized)
          if (typeof Module.callMain === 'function') {
            Module.callMain();
          } else {
            Module.onRuntimeInitialized = function() {
              Module.callMain();
            };
          }
        } catch (err) {
          if (err.name === 'SecurityError' || err.name === 'AbortError') {
            selectedPathEl.textContent = 'Access denied or cancelled. Please try again.';
            _indexedHandle = null;
            _dirIndex = null;
          } else {
            selectedPathEl.textContent = 'Error: ' + err.message;
          }
          playBtn.disabled = false;
          selectBtn.disabled = false;
          playBtn.textContent = 'Play Portal';
        }
      }

      // ====== Play button ======
      playBtn.addEventListener('click', async function() {
        await launchGame();
      });

      // ====== Select folder button (no auto-launch) ======
      selectBtn.addEventListener('click', async () => {
        try {
          const rootDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
          var params = launchParamsInput.value;
          await selectAndIndexFolder(rootDirHandle, params);
        } catch (err) {
          if (err.name === 'SecurityError' || err.name === 'AbortError') {
            selectedPathEl.textContent = 'Access denied or cancelled. Please try again.';
          } else {
            selectedPathEl.textContent = 'Error: ' + err.message;
          }
          selectBtn.disabled = false;
          selectBtn.textContent = 'Select Portal Folder';
        }
      });

      // ====== Emscripten Module ======
      var Module = {
        noInitialRun: true,
        print(...args) {
          console.log(...args);
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight;
          }
        },
        canvas: canvasElement,
        setStatus(text) {
          Module.setStatus.last ??= { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = 'none';
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Select your Portal folder to start');
      Module._FS_SAB_LOCK = new SharedArrayBuffer(4);
      Module._FS_SAB_META = new SharedArrayBuffer(64);
      Module._FS_SAB_DATA = new SharedArrayBuffer(64 * 1024 * 1024);

      // ====== Pthread worker SAB sharing ======
      // Pass SharedArrayBuffers to pthread workers for the custom FS bridge.
      // This runs before loadWasmModuleToAllWorkers is called (which happens during preRun).
      Module.preInit = Module.preInit || [];
      Module.preInit.push(function() {
        if (typeof PThread !== 'undefined' && PThread.loadWasmModuleToWorker) {
          var origLoadFn = PThread.loadWasmModuleToWorker.bind(PThread);
          PThread.loadWasmModuleToWorker = function(worker) {
            var origPost = worker.postMessage.bind(worker);
            worker.postMessage = function(msg, transfers) {
              if (msg && msg.cmd === 'load') {
                msg._FS_SAB_LOCK = Module._FS_SAB_LOCK;
                msg._FS_SAB_META = Module._FS_SAB_META;
                msg._FS_SAB_DATA = Module._FS_SAB_DATA;
              }
              return origPost(msg, transfers);
            };
            return origLoadFn(worker);
          };
        }
      });

      // Show crash overlay on unhandled error
      window.addEventListener('error', function(e) {
        showCrash(e.message || String(e.error));
      });
      var _consoleLines = [];
      var _origConsoleLog = console.log;
      var _origConsoleError = console.error;
      console.log = function() {
        var line = Array.from(arguments).join(' ');
        _consoleLines.push(line);
        _origConsoleLog.apply(console, arguments);
      };
      console.error = function() {
        var line = Array.from(arguments).join(' ');
        _consoleLines.push('[ERR] ' + line);
        _origConsoleError.apply(console, arguments);
      };
      function showCrash(msg) {
        var overlay = document.getElementById('error-overlay');
        var text = document.getElementById('error-text');
        if (!overlay || !text) return;
        text.textContent = msg + '\n\n=== Full Console ===\n' + _consoleLines.join('\n');
        overlay.style.display = 'block';
      }
      document.getElementById('copy-error-btn').addEventListener('click', function() {
        var text = document.getElementById('error-text');
        if (!text) return;
        navigator.clipboard.writeText(text.textContent).catch(function() {
          var ta = document.createElement('textarea');
          ta.value = text.textContent;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        });
      });
      window.onerror = (event) => {
        Module.setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
